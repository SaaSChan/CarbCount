<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="theme-color" content="#0a0f1a">
    <title>CarbCount</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <header class="app-header">
            <div class="app-logo">CarbCount</div>
            <nav class="nav-tabs" id="nav-tabs" style="display: none;">
                <button class="nav-tab active" data-view="estimate">Estimate</button>
                <button class="nav-tab" data-view="history">History</button>
                <button class="nav-tab" data-view="accuracy">Accuracy</button>
            </nav>
        </header>

        <!-- Error Banner -->
        <div class="error-banner" id="error-banner"></div>

        <!-- Token Entry View -->
        <div class="view active" id="token-view">
            <div class="token-icon">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#22d3ee" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/>
                    <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
            </div>
            <h1 class="token-title">CarbCount</h1>
            <p class="token-subtitle">Enter your access token to continue. Token is stored for this session only.</p>
            <div class="input-group" style="max-width: 360px;">
                <input type="password" id="token-input" placeholder="Access token" autocomplete="off">
            </div>
            <button class="btn btn-primary" id="token-submit" style="max-width: 360px; width: 100%;">Authenticate</button>
        </div>

        <!-- Estimate View -->
        <div class="view" id="estimate-view">
            <div class="estimate-form" id="estimate-form">
                <div class="input-group">
                    <label class="input-label">What are you eating?</label>
                    <textarea id="query-input" placeholder="e.g. Two slices of pepperoni pizza from Dominos, a side salad with ranch" rows="3"></textarea>
                </div>

                <button class="notes-toggle" id="notes-toggle">
                    <span id="notes-arrow">&#9654;</span> Add notes (optional)
                </button>
                <div class="notes-section" id="notes-section">
                    <input type="text" id="notes-input" placeholder="e.g. Large slices, extra cheese, light dressing">
                </div>

                <button class="btn btn-primary btn-block" id="estimate-btn">Estimate</button>
            </div>

            <!-- Loading -->
            <div class="loading-overlay" id="loading">
                <div class="spinner"></div>
                <div class="loading-text">Researching nutrition data...</div>
                <div class="loading-timer" id="loading-timer">0.0s</div>
            </div>

            <!-- Results -->
            <div class="results-container" id="results">
                <!-- Filled dynamically -->
            </div>
        </div>

        <!-- History View -->
        <div class="view" id="history-view">
            <div class="history-controls">
                <input type="text" id="history-search" placeholder="Search meals...">
                <button class="btn btn-secondary btn-small" id="history-refresh">Refresh</button>
            </div>
            <div class="history-list" id="history-list"></div>
            <button class="btn btn-secondary btn-block btn-small load-more" id="load-more" style="display: none;">Load More</button>
        </div>

        <!-- Accuracy View -->
        <div class="view" id="accuracy-view">
            <div id="accuracy-content"></div>
        </div>
    </div>

    <!-- Correction Modal -->
    <div class="modal-overlay" id="correction-modal">
        <div class="modal">
            <h2 class="modal-title">Correct This Estimate</h2>
            <p style="font-size: 13px; color: var(--text-secondary); margin-bottom: 16px;">
                Enter the actual values you measured or found on the packaging. Leave blank to keep the original estimate.
            </p>
            <div class="modal-form" id="correction-form">
                <input type="hidden" id="correction-id">
                <div class="input-group">
                    <label class="input-label">Actual Net Carbs (g)</label>
                    <input type="number" id="correction-carbs" step="0.1" placeholder="Leave blank to skip">
                </div>
                <div class="input-group">
                    <label class="input-label">Actual Protein (g)</label>
                    <input type="number" id="correction-protein" step="0.1" placeholder="Leave blank to skip">
                </div>
                <div class="input-group">
                    <label class="input-label">Actual Fat (g)</label>
                    <input type="number" id="correction-fat" step="0.1" placeholder="Leave blank to skip">
                </div>
                <div class="input-group">
                    <label class="input-label">Notes</label>
                    <input type="text" id="correction-notes" placeholder="e.g. Checked nutrition label">
                </div>
                <div class="modal-actions">
                    <button class="btn btn-secondary" id="correction-cancel" style="flex: 1;">Cancel</button>
                    <button class="btn btn-primary" id="correction-submit" style="flex: 1;">Submit</button>
                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
